<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Servers Showcase — Universe Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent2:#bc8cff;
  --green:#3fb950;--yellow:#d29922;--red:#f85149;--orange:#db6d28;
  --sidebar-w:230px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden}
.sidebar{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
.main{overflow-y:auto;background:var(--bg)}
/* Sidebar */
.sb-persona{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-avatar{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#6e40c9);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.sb-name{font-size:13px;font-weight:700;line-height:1.2}
.sb-sub{font-size:11px;color:var(--muted);line-height:1.3;margin-top:1px}
.sb-section{padding:10px 16px 3px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;
  color:var(--muted);transition:color 0.1s,background 0.1s;user-select:none;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(88,166,255,0.08);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
.nav-emoji{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface2);border-radius:10px;
  padding:1px 7px;color:var(--muted);flex-shrink:0}
.nav-item.active .nav-count{background:rgba(88,166,255,0.15);color:var(--accent)}
/* Panels */
.panel{display:none;padding:24px;min-height:100%}
.panel.active{display:block}
.panel-title{font-size:20px;font-weight:800;margin-bottom:4px}
.panel-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
/* Overview */
.ov-persona-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:20px;margin-bottom:20px;display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
.ov-avatar{width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,#1f6feb,#6e40c9);
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff}
.ov-name{font-size:22px;font-weight:800;margin-bottom:4px}
.ov-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.ov-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:12px;cursor:pointer;transition:border-color 0.15s}
.ov-chip:hover{border-color:var(--accent)}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.ov-card-title{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;font-weight:700}
.tension-row{padding:8px 10px;border-left:3px solid;background:var(--surface2);
  border-radius:0 5px 5px 0;margin-bottom:6px}
.tension-row .t-num{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.tension-row .t-title{font-size:12px;font-weight:600;margin-top:1px}
.person-row{display:flex;align-items:center;gap:10px;padding:6px 0;
  border-bottom:1px solid var(--border);cursor:pointer}
.person-row:last-child{border-bottom:none}
.pa{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.ov-scale{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.scale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:12px}
.scale-tile{background:var(--surface2);border-radius:6px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;border:1px solid transparent}
.scale-tile:hover{border-color:var(--accent)}
.scale-tile .s-emoji{font-size:20px;margin-bottom:4px}
.scale-tile .s-count{font-size:18px;font-weight:800}
.scale-tile .s-label{font-size:11px;color:var(--muted)}
/* Email */
.email-thread{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.thread-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.1s}
.thread-header:hover{background:var(--surface2)}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.unread-dot.read{background:transparent;border:1px solid var(--border)}
.thread-subj{font-size:14px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.thread-subj.has-unread{font-weight:700;color:var(--text)}
.thread-subj.all-read{font-weight:400;color:var(--muted)}
.thread-meta{font-size:12px;color:var(--muted);white-space:nowrap}
.thread-badge{background:var(--surface2);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--muted)}
.unread-badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:6px}
.thread-body{display:none;border-top:1px solid var(--border)}
.thread-body.open{display:block}
.email-msg{padding:16px;border-bottom:1px solid var(--border)}
.email-msg:last-child{border-bottom:none}
.email-msg.unread{background:rgba(88,166,255,0.04)}
.email-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.email-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.email-sender-name{font-size:13px;font-weight:600}
.email-sender-addr{font-size:11px;color:var(--muted)}
.email-time{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap}
.email-body{font-size:13px;line-height:1.7;white-space:pre-wrap;background:var(--surface2);
  padding:12px;border-radius:6px}
.email-attach{margin-top:8px;font-size:11px;color:var(--muted)}
/* Calendar */
.cal-wrap{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-nav h2{font-size:18px;font-weight:800;min-width:190px;text-align:center}
.cal-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);font-size:18px;line-height:1;transition:border-color 0.1s}
.cal-btn:hover{border-color:var(--accent)}
.cal-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-wday{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:88px;background:var(--surface);border:1px solid var(--border);border-radius:4px;
  padding:4px;cursor:pointer;transition:border-color 0.1s;overflow:hidden;position:relative}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell:not(.empty):hover{border-color:var(--accent)}
.cal-cell.sel{border-color:var(--accent);background:rgba(88,166,255,0.08)}
.cal-cell.today{border-color:var(--green)}
.cal-day-n{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:2px}
.cal-cell.has-ev .cal-day-n{color:var(--text)}
.ev-pill{font-size:10px;font-weight:500;padding:1px 4px;border-radius:3px;
  margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.ev-more{font-size:10px;color:var(--muted);margin-top:1px}
/* Tag pill colors */
.t-work{background:rgba(31,111,235,0.25);color:#79c0ff}
.t-health{background:rgba(35,134,54,0.25);color:#56d364}
.t-personal{background:rgba(110,64,201,0.25);color:#bc8cff}
.t-family{background:rgba(158,106,3,0.25);color:#e3b341}
.t-creative{background:rgba(163,25,91,0.25);color:#f778ba}
.t-legal{background:rgba(189,86,29,0.25);color:#ffa657}
.t-custody{background:rgba(218,54,51,0.25);color:#ff7b72}
.t-social{background:rgba(26,127,100,0.25);color:#39d353}
.t-fitness{background:rgba(46,160,67,0.25);color:#56d364}
.t-other{background:rgba(72,79,88,0.25);color:#8b949e}
/* Cal detail sidebar */
.cal-detail{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;position:sticky;top:0;max-height:calc(100vh - 100px);overflow-y:auto}
.cal-detail-hdr{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ev-card{margin-bottom:10px;padding:10px 12px;border-radius:6px;border-left:3px solid;background:var(--surface2)}
.ev-card-time{font-size:11px;color:var(--muted);margin-bottom:2px}
.ev-card-title{font-size:13px;font-weight:600}
.ev-card-sub{font-size:11px;color:var(--muted);margin-top:3px}
/* border colors by tag */
.bw{border-color:#1f6feb}.bh{border-color:#238636}.bp{border-color:#6e40c9}
.bf{border-color:#9e6a03}.bc{border-color:#a3195b}.bl{border-color:#bd561d}
.bcu{border-color:#da3633}.bs{border-color:#1a7f64}.bfit{border-color:#2ea043}.bo{border-color:#484f58}
/* Messaging */
.msg-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 90px);
  background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.conv-list{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.conv-list-hdr{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);flex-shrink:0}
.conv-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.conv-item:hover{background:var(--surface2)}
.conv-item.active{background:rgba(88,166,255,0.08);border-right:2px solid var(--accent)}
.conv-title{font-size:13px;font-weight:600;margin-bottom:3px}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--muted);float:right;margin-top:1px}
.msg-pane{display:flex;flex-direction:column;overflow:hidden}
.msg-pane-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-size:15px;font-weight:700;flex-shrink:0}
.msg-pane-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble-wrap{display:flex;flex-direction:column;max-width:72%}
.bubble-wrap.sent{align-self:flex-end;align-items:flex-end}
.bubble-wrap.recv{align-self:flex-start;align-items:flex-start}
.bubble-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
.bubble{padding:9px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.bubble.sent{background:#1f6feb;color:#fff;border-bottom-right-radius:4px}
.bubble.recv{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
/* Contacts */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
.ccard:hover{border-color:var(--accent);transform:translateY(-1px)}
.ccard-hdr{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.cavatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.cname{font-size:14px;font-weight:700}
.cjob{font-size:12px;color:var(--muted)}
.cdetail{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.you-badge{display:inline-block;font-size:10px;background:rgba(88,166,255,0.15);
  color:var(--accent);padding:1px 6px;border-radius:10px;font-weight:700;margin-top:4px}
/* Contact modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:24px;max-width:500px;width:92%;max-height:82vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.close-x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;padding:2px 8px;border-radius:4px}
.close-x:hover{color:var(--text)}
.fp{display:grid;grid-template-columns:110px 1fr;gap:4px 12px;font-size:13px;margin-bottom:6px}
.fl{color:var(--muted);font-weight:600}
.desc-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:12px;font-size:12px;line-height:1.7;margin-top:10px;white-space:pre-wrap}
/* Strava */
.act-list{display:flex;flex-direction:column;gap:8px}
.act-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 16px;display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:start}
.act-card.late{border-left:3px solid var(--red)}
.act-icon{font-size:20px;margin-top:2px}
.act-name{font-size:14px;font-weight:600}
.act-date{font-size:12px;color:var(--muted);margin-top:1px}
.act-stats{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.stat{font-size:12px;color:var(--muted)}
.stat strong{color:var(--text)}
/* Fintrack */
.acc-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.acc-tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.15s}
.acc-tab.active{background:rgba(88,166,255,0.1);border-color:var(--accent);color:var(--accent)}
.acc-summary{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.acc-bal{font-size:24px;font-weight:800}
.txn-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.txn-row{display:grid;grid-template-columns:96px 1fr 100px 90px;gap:12px;
  padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.txn-row:last-child{border-bottom:none}
.txn-row:hover{background:var(--surface2)}
.txn-hdr{background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.6px;color:var(--muted)}
.txn-date{color:var(--muted)}
.txn-merch{font-weight:500}
.txn-cat{font-size:11px;color:var(--muted)}
.txn-amt{font-weight:700;text-align:right}
.txn-amt.cr{color:var(--green)}.txn-amt.dr{color:var(--red)}
/* Generic */
.gen-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.gen-sec-title{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted)}
.gen-rec{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.gen-rec:last-child{border-bottom:none}
.gen-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:3px 14px}
.gf-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.gf-val{font-size:12px;word-break:break-word}
.gf-val.muted{color:var(--muted)}
/* Markdown */
.md-body{max-width:820px;font-size:14px;line-height:1.75}
.md-body h1{font-size:22px;font-weight:800;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.md-body h2{font-size:17px;font-weight:700;margin:24px 0 10px;color:var(--accent);padding-bottom:6px;border-bottom:1px solid var(--border)}
.md-body h3{font-size:14px;font-weight:700;margin:16px 0 6px;color:var(--accent2)}
.md-body p{margin-bottom:10px}
.md-body ul,.md-body ol{padding-left:20px;margin-bottom:10px}
.md-body li{margin-bottom:4px}
.md-body strong{font-weight:700}
.md-body em{font-style:italic;color:var(--muted)}
.md-body code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px;font-family:ui-monospace,monospace}
.md-body table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.md-body th{background:var(--surface2);padding:8px 12px;text-align:left;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.md-body td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.md-body hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.md-body blockquote{border-left:3px solid var(--accent);padding:8px 16px;background:var(--surface2);border-radius:0 6px 6px 0;margin:8px 0}
/* Utils */
.muted{color:var(--muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">
  <div class="sb-persona">
    <div class="sb-avatar">AS</div>
    <div>
      <div class="sb-name">All Servers Showcase</div>
      <div class="sb-sub"></div>
    </div>
  </div>
  <div style="padding-bottom:16px">
    <div class="nav-item active" data-nav="overview"><span class="nav-emoji">🏠</span> Overview</div>
    <div class="sb-section">Data</div>
    <div id="data-nav-items"></div>
    <div class="sb-section">Docs</div>
    <div class="nav-item" data-nav="memory"><span class="nav-emoji">🧠</span> Memory </div>
<div class="nav-item" data-nav="tensions"><span class="nav-emoji">⚠️</span> Tensions <span class="nav-count">7</span></div>
<div class="nav-item" data-nav="storylines"><span class="nav-emoji">📖</span> Storylines </div>
<div class="nav-item" data-nav="npcs"><span class="nav-emoji">🤝</span> Relationships </div>

  </div>
</div>

<div class="main">
  <div class="panel active" id="panel-overview">
    <div id="ov-content"></div>
  </div>
  <div class="panel" id="panel-server">
    <div class="panel-title" id="sv-title"></div>
    <div class="panel-sub" id="sv-sub"></div>
    <div id="sv-content"></div>
  </div>
  <div class="panel" id="panel-memory"><div id="md-memory"></div></div>
  <div class="panel" id="panel-tensions"><div id="md-tensions"></div></div>
  <div class="panel" id="panel-storylines"><div id="md-storylines"></div></div>
  <div class="panel" id="panel-npcs"><div id="md-npcs"></div></div>
</div>

</div>

<div class="overlay" id="overlay" onclick="closeModal()">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

SEED["messaging"] = {"conversations": [{"conversation_id": "70eaa57ae8e1498912542244", "title": "Family Group Chat", "participant_ids": ["p_victor", "p_alejandro", "p_maria_r"], "messages": [{"message_id": "918311b77905bb3631ba9b9b", "sender_id": "p_alejandro", "timestamp": 1759803240.0, "content": "Hey guys. Victor, how's Mom? I called her Sunday and she seemed a little scattered. Kept repeating the same story about T\u00eda Elena.", "attachment_name": null}, {"message_id": "90b87efb00921613595de8a3", "sender_id": "p_victor", "timestamp": 1759798920.0, "content": "She has her moments. Overall she's doing well. Rosa is great with her and she sees Dr. Pham next week.", "attachment_name": null}, {"message_id": "a4110c9e9decddfea4a51466", "sender_id": "p_maria_r", "timestamp": 1759799880.0, "content": "I visited last weekend! She was in great spirits. We looked through old photos and she remembered everything about the Guadalajara trip. She made me pozole \ud83e\udd63", "attachment_name": null}, {"message_id": "8935afe9381a68abc53342e4", "sender_id": "p_alejandro", "timestamp": 1759808100.0, "content": "That's good to hear. I just worry because I'm so far away. Vic can you keep me in the loop after her appointment?", "attachment_name": null}, {"message_id": "aa262c38277293a2a6492194", "sender_id": "p_victor", "timestamp": 1759801320.0, "content": "Of course. I'll let you know how it goes.", "attachment_name": null}, {"message_id": "dd9d761f75b2daef0dee424d", "sender_id": "p_victor", "timestamp": 1760653800.0, "content": "Mom's appointment went well. Dr. Pham says she's stable on the donepezil. No changes to treatment. She had a good day \u2014 knew everyone, told the nurse about the restaurant.", "attachment_name": null}, {"message_id": "2e74fc98ee50b12d287e1ba7", "sender_id": "p_alejandro", "timestamp": 1760663700.0, "content": "Thanks for the update. Stable is good. Does Dr. Pham think she'll need a higher level of care anytime soon?", "attachment_name": null}, {"message_id": "12f5738036b740817de7e90a", "sender_id": "p_victor", "timestamp": 1760658300.0, "content": "Not at this time. She's well cared for at home.", "attachment_name": null}, {"message_id": "70aa92a509dd16a79364c5a5", "sender_id": "p_maria_r", "timestamp": 1760659320.0, "content": "That's wonderful news. T\u00eda is tough. She's not going anywhere \ud83d\udcaa", "attachment_name": null}, {"message_id": "c1e62a75a32dbfd0dc41dd29", "sender_id": "p_alejandro", "timestamp": 1762363800.0, "content": "I'm thinking about coming for Thanksgiving. It's been too long since I've seen Mom in person.", "attachment_name": null}, {"message_id": "0051f75d318f971aa0837bd8", "sender_id": "p_maria_r", "timestamp": 1762361280.0, "content": "That would be great Ale! I'm driving down from Chicago too. Full family Thanksgiving!", "attachment_name": null}, {"message_id": "c984a1cd458155799dab4cba", "sender_id": "p_victor", "timestamp": 1762366500.0, "content": "Sounds good. I'll be working lunch at the restaurant but I'll be home by 4. I'm doing the turkey.", "attachment_name": null}, {"message_id": "13d2a194fca63bf40b94d18b", "sender_id": "p_alejandro", "timestamp": 1762371720.0, "content": "I'll handle the tamales. Mom's recipe. I've been practicing.", "attachment_name": null}, {"message_id": "983a719377a5df72854f1e95", "sender_id": "p_alejandro", "timestamp": 1764302880.0, "content": "Victor. Mom didn't know it was Thanksgiving today. She asked where Pap\u00e1 was. Twice.", "attachment_name": null}, {"message_id": "6b1fc9c3aaea5da31c856437", "sender_id": "p_victor", "timestamp": 1764300720.0, "content": "She has confusion episodes. They come and go. Dr. Pham is aware.", "attachment_name": null}, {"message_id": "8db6342ab9d48d53e504145d", "sender_id": "p_alejandro", "timestamp": 1764304800.0, "content": "Come and go? She called me Papa for ten minutes. She didn't know what year it was. That's not a bad day Victor. That's decline.", "attachment_name": null}, {"message_id": "f2cf2023c7618b181c9f77da", "sender_id": "p_maria_r", "timestamp": 1764302700.0, "content": "She did have a rough evening but she was fine this morning. We made breakfast together and she was totally with it. Please don't panic after one bad moment.", "attachment_name": null}, {"message_id": "97e2c9a21c0e712fefc89f79", "sender_id": "p_alejandro", "timestamp": 1764343800.0, "content": "I'm not panicking. I'm being realistic. She needs to be reassessed. And we need to have a serious conversation about what happens when things get worse.", "attachment_name": null}, {"message_id": "0ef019c2b5d316adead73edf", "sender_id": "p_victor", "timestamp": 1764344700.0, "content": "Things are under control, Ale. I'm here every day. I manage her medication, her appointments, her meals. What exactly do you think needs to change?", "attachment_name": null}, {"message_id": "d8aa282d0379e74c2dab3ee1", "sender_id": "p_alejandro", "timestamp": 1764349920.0, "content": "For starters, she needs a memory care evaluation. And we should be looking at facilities. Just in case. Not saying right now but we should have a plan.", "attachment_name": null}, {"message_id": "3576c2e8a9b79d5e922f3fa3", "sender_id": "p_victor", "timestamp": 1764347400.0, "content": "She is not going to a facility. She lives in her home with her son. That IS the plan.", "attachment_name": null}, {"message_id": "9aade5321e6c14d4a7898ad1", "sender_id": "p_maria_r", "timestamp": 1764349200.0, "content": "Both of you. Take a breath. Nobody is putting T\u00eda anywhere. Let's just get through the weekend and talk about this calmly later.", "attachment_name": null}, {"message_id": "e3e72b0e2800e23fb74575cd", "sender_id": "p_alejandro", "timestamp": 1765228800.0, "content": "Victor, I've been doing research. There are excellent memory care facilities in both Milwaukee and Phoenix. I'm not the enemy here.", "attachment_name": null}, {"message_id": "554f0fa642104be0b8e74d45", "sender_id": "p_victor", "timestamp": 1765227900.0, "content": "Phoenix? You want to move our mother 1,700 miles away from everything she knows? From her home, her church, her aide who she loves?", "attachment_name": null}, {"message_id": "f912ecf654350a4547113567", "sender_id": "p_alejandro", "timestamp": 1765232280.0, "content": "I want her to have options. And I want some transparency about her care. You won't share her records, you won't share Dr. Pham's notes, you won't even tell me the details of her medication changes.", "attachment_name": null}, {"message_id": "9d89eafc8c8155446d2326f0", "sender_id": "p_victor", "timestamp": 1765229700.0, "content": "There haven't been medication changes. She's stable on donepezil. I've told you this multiple times.", "attachment_name": null}, {"message_id": "73b482040a6d5d379ed5f025", "sender_id": "p_alejandro", "timestamp": 1765233720.0, "content": "Then share the records and prove it. If everything is fine, what are you hiding?", "attachment_name": null}, {"message_id": "faf2411de8ee5b193ecc20e8", "sender_id": "p_maria_r", "timestamp": 1765232100.0, "content": "Guys. Please. It's Christmas season. Can we not do this right now? Ale, Victor is doing his best. Victor, Ale has a right to be concerned. Can we find a middle ground?", "attachment_name": null}, {"message_id": "c12dd1a8de61ea244946a74b", "sender_id": "p_alejandro", "timestamp": 1765382400.0, "content": "I've tried middle ground for months. If Victor won't cooperate, I may need to look into power of attorney to make sure Mom's interests are protected.", "attachment_name": null}, {"message_id": "775ac67238af315b9b61c58c", "sender_id": "p_victor", "timestamp": 1765383300.0, "content": "Power of attorney. Wow. You're going to threaten me with legal action over our mother.", "attachment_name": null}, {"message_id": "ccd105578d8e00b152466b9c", "sender_id": "p_alejandro", "timestamp": 1765387320.0, "content": "It's not a threat. It's an option. One you're forcing me toward by refusing to communicate.", "attachment_name": null}, {"message_id": "40a70a491025568ff9c5ea67", "sender_id": "p_maria_r", "timestamp": 1765386000.0, "content": "I can't believe this is where we are. We're a family. T\u00eda wouldn't want this. Both of you need to step back.", "attachment_name": null}, {"message_id": "01839d43557994804d0f2b61", "sender_id": "p_alejandro", "timestamp": 1767636000.0, "content": "Victor, I'm done asking nicely. I've tried for months to have a conversation about Mom's care. If you won't even consider options, I'll have to take action. I'm telling you directly before I do anything.", "attachment_name": null}, {"message_id": "487a253434040a3dff3f75f2", "sender_id": "p_victor", "timestamp": 1767644400.0, "content": "I've given you updates. Mom is stable. I don't know what else you want from me.", "attachment_name": null}, {"message_id": "c031a3c15ad8465ca2be8908", "sender_id": "p_alejandro", "timestamp": 1767648900.0, "content": "I want her medical records. I want her financial records. I want to know exactly what's happening.", "attachment_name": null}, {"message_id": "2f1f92007ec6ec2fc891cefe", "sender_id": "p_victor", "timestamp": 1767647400.0, "content": "Talk to my attorney if you need records. Sandra Milovich, (414) 555-0617.", "attachment_name": null}, {"message_id": "58bb5737b4cc6777ae1e9a8d", "sender_id": "p_alejandro", "timestamp": 1767651300.0, "content": "Your attorney. Unbelievable.", "attachment_name": null}, {"message_id": "9d62cb458cf56a96caaefeb9", "sender_id": "p_maria_r", "timestamp": 1767650400.0, "content": "Victor, was that really necessary? Ale, please try to understand \u2014 Victor is overwhelmed. He's doing this alone.", "attachment_name": null}, {"message_id": "e234fae39f61a6cb208ff6a2", "sender_id": "p_alejandro", "timestamp": 1767654480.0, "content": "He doesn't have to do it alone. That's the whole point.", "attachment_name": null}, {"message_id": "40ab9ee07df65051e42641bc", "sender_id": "p_maria_r", "timestamp": 1768782600.0, "content": "I talked to T\u00eda today. She asked about both of you. She said \"my boys are fighting\" and it made her cry. Just thought you should know.", "attachment_name": null}, {"message_id": "a680f690a420d2cab1d984fe", "sender_id": "p_alejandro", "timestamp": 1770577200.0, "content": "I've retained an attorney. Douglas Hartfield. I didn't want to go this route but Victor has given me no choice. If you won't share Mom's records voluntarily, my attorney will handle it.", "attachment_name": null}, {"message_id": "b5b8622b2ec152f738e388d0", "sender_id": "p_maria_r", "timestamp": 1770575400.0, "content": "Ale, no. Please. Lawyers? We're family. There has to be another way.", "attachment_name": null}, {"message_id": "5dd620879fc8894bdf253281", "sender_id": "p_alejandro", "timestamp": 1770579900.0, "content": "I've tried every other way. Victor won't talk to me, won't share information, won't let me be involved. What am I supposed to do?", "attachment_name": null}, {"message_id": "30a995aa7266d25d5426c1c1", "sender_id": "p_maria_r", "timestamp": 1770580800.0, "content": "Victor? Are you there?", "attachment_name": null}, {"message_id": "14240e802f546201a7491091", "sender_id": "p_maria_r", "timestamp": 1770650100.0, "content": "Victor, please say something. Don't shut down.", "attachment_name": null}, {"message_id": "bcee0975acf3d9a0622b2a98", "sender_id": "p_victor", "timestamp": 1770658920.0, "content": "I have nothing to say that won't be used against me.", "attachment_name": null}, {"message_id": "aa61a1208107eba71005fd58", "sender_id": "p_maria_r", "timestamp": 1770660300.0, "content": "Used against you? Victor, we're your family. Nobody is trying to use anything against anyone. Please.", "attachment_name": null}, {"message_id": "5e4344110c94c0151bd49d82", "sender_id": "p_alejandro", "timestamp": 1771812000.0, "content": "I called Mom today. She had a good day. Told me about the garden she wants to plant. I miss her.", "attachment_name": null}, {"message_id": "a336c8babc3b14d44fb7aca2", "sender_id": "p_maria_r", "timestamp": 1771810200.0, "content": "She told me the same thing! She wants tomatoes and jalape\u00f1os. Like Abuela's garden.", "attachment_name": null}, {"message_id": "ee607e46d91cc8f0bd454349", "sender_id": "p_alejandro", "timestamp": 1772734500.0, "content": "Victor I sent you a formal records request. I expect you or your attorney to respond within 14 days.", "attachment_name": null}, {"message_id": "0b4b1e9c83864c3dd43aea95", "sender_id": "p_victor", "timestamp": 1772739000.0, "content": "My attorney has it. She'll respond to yours.", "attachment_name": null}, {"message_id": "ef5e4c6b9c15d6ae35ca510c", "sender_id": "p_maria_r", "timestamp": 1772742000.0, "content": "This is so sad. T\u00eda deserves better than this from both of you.", "attachment_name": null}, {"message_id": "9406576a5d4fe3bd04dd670d", "sender_id": "p_alejandro", "timestamp": 1773588600.0, "content": "I'm flying in Thursday the 20th. Arriving around noon. I'll come by the house to see Mom. Victor, I'd appreciate it if you were there.", "attachment_name": null}, {"message_id": "ee612fcf8d416ce5275a1fd4", "sender_id": "p_victor", "timestamp": 1773591480.0, "content": "I work Thursday lunch. I can be home by 3. Rosa will be with Mom until then.", "attachment_name": null}, {"message_id": "4d4846f4b4e836ccc8fbcdf3", "sender_id": "p_maria_r", "timestamp": 1773594300.0, "content": "I'll drive down from Chicago that morning. We can all have coffee and talk like adults. Please. For T\u00eda.", "attachment_name": null}, {"message_id": "3de0a0b1bf774af1361f7549", "sender_id": "p_alejandro", "timestamp": 1774057500.0, "content": "Mom looked good today. She was happy to see me. We sat in the kitchen and she told me about the fish fry at church. She remembered everything about it.", "attachment_name": null}, {"message_id": "b24c64d1eeb99434080ea10f", "sender_id": "p_maria_r", "timestamp": 1774051800.0, "content": "I'm so glad. How did the visit go otherwise? Did you guys talk?", "attachment_name": null}, {"message_id": "82dcc422d10700fe5477a1b8", "sender_id": "p_alejandro", "timestamp": 1774059900.0, "content": "Victor and I were polite. That's about all I can say. He wouldn't discuss records or care plans. Told me to talk to his lawyer.", "attachment_name": null}, {"message_id": "919f5e08ed571dfdb091410b", "sender_id": "p_maria_r", "timestamp": 1774053720.0, "content": "At least you saw T\u00eda. That matters. Both of you are coming from a place of love even if it doesn't feel like it right now.", "attachment_name": null}, {"message_id": "185a8d860806933cb9052538", "sender_id": "p_victor", "timestamp": 1774062900.0, "content": "Mom had a good day with everyone here. That's what matters.", "attachment_name": null}], "last_updated": 1774062900.0}, {"conversation_id": "42bf06133b3d341ef7ee4ea2", "title": "Dave K", "participant_ids": ["p_victor", "p_dave"], "messages": [{"message_id": "7cbb463fede8b5e2f66d167f", "sender_id": "p_victor", "timestamp": 1774500720.0, "content": "Home. Mom's asleep. I'm going to bed.", "attachment_name": null}, {"message_id": "7bb02c4b3ec4417155b321dd", "sender_id": "p_dave", "timestamp": 1774500840.0, "content": "Proud of you. See you Saturday. Sleep well brother.", "attachment_name": null}, {"message_id": "bb447bd3d33b8b880e6ab3b4", "sender_id": "p_dave", "timestamp": 1759407300.0, "content": "Morning Vic. How are we today?", "attachment_name": null}, {"message_id": "2cfc79f97cd6b9c73724dea6", "sender_id": "p_victor", "timestamp": 1759408920.0, "content": "Good day. Busy but good. Fall menu launched at the restaurant and Mom had a great morning.", "attachment_name": null}, {"message_id": "cc2cf6874d5528b37cabd5ad", "sender_id": "p_dave", "timestamp": 1759409280.0, "content": "Glad to hear it. 2 and a half years tomorrow, brother. That's something to be proud of.", "attachment_name": null}, {"message_id": "5191d227d0e6965d617db42c", "sender_id": "p_victor", "timestamp": 1759409520.0, "content": "913 days. Not that I'm counting.", "attachment_name": null}, {"message_id": "1a50ca7e0a0e3ac70712b21d", "sender_id": "p_dave", "timestamp": 1759409700.0, "content": "You better be counting. Every one of them matters. See you Saturday?", "attachment_name": null}, {"message_id": "f43c8bb41b889b1831a77096", "sender_id": "p_victor", "timestamp": 1759409880.0, "content": "Wouldn't miss it.", "attachment_name": null}, {"message_id": "abb6d427938be7b1a335d73b", "sender_id": "p_dave", "timestamp": 1760529000.0, "content": "How's the week been? Any tough moments?", "attachment_name": null}, {"message_id": "fb2331823e2e0f7b23337005", "sender_id": "p_victor", "timestamp": 1760530200.0, "content": "All good. Wine tasting at the restaurant yesterday for the fall list, but I had Maria handle it. Didn't even go near the room.", "attachment_name": null}, {"message_id": "08341d084dbb72595dc26afc", "sender_id": "p_dave", "timestamp": 1760530440.0, "content": "Smart man. Boundaries are everything. Proud of you.", "attachment_name": null}, {"message_id": "0fa834d99ca839e2a12f1351", "sender_id": "p_dave", "timestamp": 1762779600.0, "content": "Checking in. How's things?", "attachment_name": null}, {"message_id": "6f8de804fdab3e810e0fb566", "sender_id": "p_victor", "timestamp": 1762781100.0, "content": "Family stuff. Brother's coming for Thanksgiving and there's tension about Mom's care. He thinks I'm not doing enough.", "attachment_name": null}, {"message_id": "62f5e1ac355a378f206d45b1", "sender_id": "p_dave", "timestamp": 1762781400.0, "content": "Family can be the hardest trigger. You know that. How are you feeling about it?", "attachment_name": null}, {"message_id": "688d72843c69952d327aaa7e", "sender_id": "p_victor", "timestamp": 1762781880.0, "content": "Angry mostly. He doesn't do anything for Mom but has opinions about everything. I'm the one here every day.", "attachment_name": null}, {"message_id": "c7760fc17a0cfbc270d87a8e", "sender_id": "p_dave", "timestamp": 1762782120.0, "content": "Anger is dangerous for us. You know where to put it. Meeting Wednesday. Write about it before then.", "attachment_name": null}, {"message_id": "13a493d3aef4d8db49db9adc", "sender_id": "p_victor", "timestamp": 1764391500.0, "content": "Dave. Rough Thanksgiving. My brother saw Mom confused and went off about facilities and moving her to Phoenix. We argued. Badly.", "attachment_name": null}, {"message_id": "5e82aa95e923e7e5742703c3", "sender_id": "p_dave", "timestamp": 1764391800.0, "content": "I'm sorry brother. That's heavy. How are you right now? Be honest.", "attachment_name": null}, {"message_id": "a6fe2a1efba13c8481897ab1", "sender_id": "p_victor", "timestamp": 1764392280.0, "content": "Cravings were real for the first time in months. Sitting in the kitchen and there's a bottle of Barolo on the counter from dinner. I can smell it from here.", "attachment_name": null}, {"message_id": "e61dee71a9ecec6497f8c1a3", "sender_id": "p_dave", "timestamp": 1764392400.0, "content": "Put the bottle away. Not in the trash, just out of sight. Pour yourself some water. Did you take your pill today?", "attachment_name": null}, {"message_id": "66405834de03fc73886de471", "sender_id": "p_victor", "timestamp": 1764392700.0, "content": "Yes. 8 AM like always. I'm putting the bottle in the pantry. I'm not going to drink it.", "attachment_name": null}, {"message_id": "ec3aabf5352849a96febfb98", "sender_id": "p_dave", "timestamp": 1764392820.0, "content": "I know you're not. But call me if that changes. Even at 3 AM. I mean it Vic.", "attachment_name": null}, {"message_id": "63a29b9ee4f74b19b508f554", "sender_id": "p_victor", "timestamp": 1764393000.0, "content": "I know. Thank you Dave.", "attachment_name": null}, {"message_id": "d49cb210ffddad86771c8880", "sender_id": "p_dave", "timestamp": 1765027200.0, "content": "Holiday season at the restaurant this week? How's that going?", "attachment_name": null}, {"message_id": "b405c928f47c4b593d14f3ae", "sender_id": "p_victor", "timestamp": 1765028100.0, "content": "It's nonstop. Had to pour champagne for 60 people at a corporate event last night. Maria handled the bar but I was running the floor and I could smell everything.", "attachment_name": null}, {"message_id": "ba07a9a944314be84c747c2d", "sender_id": "p_dave", "timestamp": 1765028400.0, "content": "December is always the hardest month for people in our shoes. How'd you handle it?", "attachment_name": null}, {"message_id": "403c021ba6de4839194dc958", "sender_id": "p_victor", "timestamp": 1765028880.0, "content": "Stayed busy. Focused on the food, the guests, the logistics. Didn't let myself stop moving. By the time I got home I was too tired to think about it.", "attachment_name": null}, {"message_id": "89614a623247c953098d3690", "sender_id": "p_dave", "timestamp": 1765029120.0, "content": "That works short term. Make sure you're not just white-knuckling through December. Meeting Wednesday, journal before then. Deal?", "attachment_name": null}, {"message_id": "99e96823aaa7263913b7db56", "sender_id": "p_victor", "timestamp": 1765029240.0, "content": "Deal.", "attachment_name": null}, {"message_id": "f5597027de7d67a65ec0b023", "sender_id": "p_victor", "timestamp": 1767251700.0, "content": "NYE was brutal. Open bar for the prix fixe, every table had bottles of champagne. I had to give a toast to the room at midnight with sparkling water in a champagne flute. Nobody noticed but I noticed.", "attachment_name": null}, {"message_id": "969d4f5c243a24a67798a466", "sender_id": "p_dave", "timestamp": 1767252000.0, "content": "But you're texting me at 1 AM sober. That's a win, Vic. Happy New Year brother.", "attachment_name": null}, {"message_id": "880ed34fac633d6abe238066", "sender_id": "p_dave", "timestamp": 1767877500.0, "content": "Morning. How's the new year treating you?", "attachment_name": null}, {"message_id": "18dac1f41d4dd1b1de2af2a9", "sender_id": "p_victor", "timestamp": 1767879000.0, "content": "Something's going on at work that I can't really talk about yet. Just stressed. Can't get into details.", "attachment_name": null}, {"message_id": "1ee45a2bfb1f8f7d4d7d5a99", "sender_id": "p_dave", "timestamp": 1767879300.0, "content": "You don't have to tell me what it is. Just tell me how you're handling it.", "attachment_name": null}, {"message_id": "7abe48bd02a505dc11e3c9a0", "sender_id": "p_victor", "timestamp": 1767879600.0, "content": "Taking my pill. Going to meetings. Not drinking. Just grinding through it.", "attachment_name": null}, {"message_id": "aa8945bf214b8ecf382d3d84", "sender_id": "p_dave", "timestamp": 1767879780.0, "content": "That's all you can do. You know where I am.", "attachment_name": null}, {"message_id": "0f143a73e8a7174e44f2f9c3", "sender_id": "p_victor", "timestamp": 1768658400.0, "content": "Furnace died last night. -12 outside. Had to wrap Mom in every blanket in the house until the repair guy came this morning. $480 I didn't have.", "attachment_name": null}, {"message_id": "1e97f019418960e5bb40a81b", "sender_id": "p_dave", "timestamp": 1768658700.0, "content": "Damn. Is she okay? Are you okay?", "attachment_name": null}, {"message_id": "adec8313429b65b39d7653ac", "sender_id": "p_victor", "timestamp": 1768659120.0, "content": "She's fine. I'm fine. Just tired of everything being an emergency.", "attachment_name": null}, {"message_id": "56b88e3a71d9816d3edb3b1b", "sender_id": "p_dave", "timestamp": 1768659300.0, "content": "I hear you. But you handled it. That's what matters.", "attachment_name": null}, {"message_id": "481baaa25d89de33096337df", "sender_id": "p_dave", "timestamp": 1770297000.0, "content": "How's the week?", "attachment_name": null}, {"message_id": "6561a25a60e1cb578a57b37d", "sender_id": "p_victor", "timestamp": 1770298200.0, "content": "Money's tight. Everything is tight. Legal bills, Mom's care costs, the restaurant needs things, and my brother is making everything harder.", "attachment_name": null}, {"message_id": "008ffcc22a68b721c6af7e54", "sender_id": "p_dave", "timestamp": 1770298500.0, "content": "Financial stress is one of the biggest relapse triggers. Are you doing okay? Really okay?", "attachment_name": null}, {"message_id": "fe64c41d412fd53513901217", "sender_id": "p_victor", "timestamp": 1770298920.0, "content": "I'm holding it together. Barely. But I am.", "attachment_name": null}, {"message_id": "9e83199276a87b29a43f0b53", "sender_id": "p_dave", "timestamp": 1770299100.0, "content": "Barely counts. Extra meeting this week? I'll go with you.", "attachment_name": null}, {"message_id": "de5d2f9cbb018dd53232c7db", "sender_id": "p_victor", "timestamp": 1770299280.0, "content": "Yeah. Wednesday. I'll be there.", "attachment_name": null}, {"message_id": "628d8f92d1b2ae59bbec0573", "sender_id": "p_victor", "timestamp": 1771134300.0, "content": "Valentine's Day at the restaurant tonight. 240 covers. Every table had wine and cocktails flowing. I'm exhausted.", "attachment_name": null}, {"message_id": "6e949379da2b121aed64dbcb", "sender_id": "p_dave", "timestamp": 1771134600.0, "content": "How'd you do?", "attachment_name": null}, {"message_id": "a0a9321cac7b0637f9367a7f", "sender_id": "p_victor", "timestamp": 1771134900.0, "content": "Fine. Stayed in the kitchen mostly. Tony and Maria ran the floor and bar. I just cooked and counted plates.", "attachment_name": null}, {"message_id": "96728d732c7e37fd13974e86", "sender_id": "p_dave", "timestamp": 1771135080.0, "content": "Smart. Knowing your limits is everything. Sleep well brother.", "attachment_name": null}, {"message_id": "e1d5ee3f5ac0d1a0eb2b8a48", "sender_id": "p_dave", "timestamp": 1773491400.0, "content": "3 years today brother. I know you don't need me to tell you, but I'm proud of you. Meeting tonight if you want. Or just call.", "attachment_name": null}, {"message_id": "4a5da0acc424063af3990569", "sender_id": "p_victor", "timestamp": 1773492300.0, "content": "Thanks Dave. It means everything. I'll be at the Wednesday meeting.", "attachment_name": null}, {"message_id": "625882ac00aa34275a563ff5", "sender_id": "p_dave", "timestamp": 1773835920.0, "content": "Morning brother. How'd you sleep?", "attachment_name": null}, {"message_id": "1c24175011feb44ad3ee9f0b", "sender_id": "p_victor", "timestamp": 1773836880.0, "content": "3 hours. Mom was up at 2 AM confused. Thought she was at her parents' house. Took 45 minutes to get her settled.", "attachment_name": null}, {"message_id": "05f1811f563679a5f39a4894", "sender_id": "p_dave", "timestamp": 1773837060.0, "content": "That's rough. You take your pill this morning?", "attachment_name": null}, {"message_id": "10a449b605fda583299465eb", "sender_id": "p_victor", "timestamp": 1773837180.0, "content": "Yeah. 8 AM like clockwork. One thing I never miss.", "attachment_name": null}, {"message_id": "10d197aa0ff58632e3d3d08f", "sender_id": "p_dave", "timestamp": 1774007700.0, "content": "Good man. Any tough moments this week?", "attachment_name": null}, {"message_id": "63adf8804c15a37a2cb6eda8", "sender_id": "p_victor", "timestamp": 1774008900.0, "content": "Had a customer chew out my bartender about a cocktail. Old fashioned wasn't sweet enough or something. Stood there smelling bourbon for 10 minutes while I handled it. I'm fine but it wasn't nothing.", "attachment_name": null}, {"message_id": "efdd90f04c312924a18b2a5f", "sender_id": "p_dave", "timestamp": 1774009200.0, "content": "That's an honest answer. You want to talk before Saturday's meeting?", "attachment_name": null}, {"message_id": "e61f481ce5801ad24e45e443", "sender_id": "p_victor", "timestamp": 1774009500.0, "content": "Nah I'm okay. Just wanted to name it. I'll see you Saturday.", "attachment_name": null}, {"message_id": "96a5de440bad6d61c33c1591", "sender_id": "p_dave", "timestamp": 1774009620.0, "content": "Always here. 3 years and 6 days, Vic. That's not nothing either.", "attachment_name": null}, {"message_id": "9163116c2d7c1a7f00af8e5a", "sender_id": "p_victor", "timestamp": 1774498440.0, "content": "Still at the restaurant. Long night. Just tired.", "attachment_name": null}, {"message_id": "a9a47277fbe8b1db76f18654", "sender_id": "p_dave", "timestamp": 1774498680.0, "content": "Tired or struggling? No judgment.", "attachment_name": null}, {"message_id": "8cdc123b17a0b93f126e7940", "sender_id": "p_victor", "timestamp": 1774499040.0, "content": "Just tired. I think. Going home.", "attachment_name": null}, {"message_id": "c9d19cf61cee4c4023bd6b44", "sender_id": "p_dave", "timestamp": 1774499100.0, "content": "Text me when you're home safe. I mean it.", "attachment_name": null}], "last_updated": 1774500840.0}, {"conversation_id": "1b0ad74e0663010c5cd20a11", "title": "Tony A", "participant_ids": ["p_victor", "p_tony"], "messages": [{"message_id": "53df187edf19023ad4b3bf1b", "sender_id": "p_tony", "timestamp": 1760023800.0, "content": "Hey boss. Fall menu is looking great. Pumpkin ravioli sold out by 8 last night. Want me to double prep tomorrow?", "attachment_name": null}, {"message_id": "f40b04325bd428c6f5957993", "sender_id": "p_victor", "timestamp": 1760024700.0, "content": "Double it. If we sell out two nights in a row that's a signal. Also bump up the short rib pappardelle \u2014 that's moving fast too.", "attachment_name": null}, {"message_id": "b9e8b947952e48350b4c6bcf", "sender_id": "p_tony", "timestamp": 1760025120.0, "content": "On it. How's your Mom doing? You mentioned she had a doctor's visit this week.", "attachment_name": null}, {"message_id": "981e0e80805e7be1b822aeab", "sender_id": "p_victor", "timestamp": 1760025600.0, "content": "She's good. Doctor says stable. Appreciate you asking, Tony.", "attachment_name": null}, {"message_id": "fe8e0b3f6dd63f54cdbc6e6c", "sender_id": "p_tony", "timestamp": 1761160500.0, "content": "Sysco was short on the wild mushroom blend. Had to sub with cremini and shiitake from Metro Market. Worked fine but wanted you to know.", "attachment_name": null}, {"message_id": "88ededfd356eb322e297f990", "sender_id": "p_victor", "timestamp": 1761161400.0, "content": "Good call. I'll talk to Dan about the reliability issues. Third short shipment this month.", "attachment_name": null}, {"message_id": "db769f8bb65b63fe6757bae1", "sender_id": "p_victor", "timestamp": 1763478000.0, "content": "Tony, holiday party season. I need you to build out the prix fixe and get specialty orders to Sysco by next Friday. Can you handle the wine pairings with Maria?", "attachment_name": null}, {"message_id": "b182244709bc20ba8c99d766", "sender_id": "p_tony", "timestamp": 1763479200.0, "content": "Already on it. Meeting with Maria tomorrow to finalize pairings. I'm thinking the braised short rib, lobster ravioli, and chocolate torte for the prix fixe. Classic Bella Notte.", "attachment_name": null}, {"message_id": "500b07f064bb5ae9ad3b02ae", "sender_id": "p_victor", "timestamp": 1763479680.0, "content": "Perfect. That's exactly what I was thinking. Let's kill it this December.", "attachment_name": null}, {"message_id": "c189fde3760a78e3b47d60fc", "sender_id": "p_tony", "timestamp": 1766941200.0, "content": "NYE prep list is done. 120 covers confirmed for the prix fixe. Sysco special order confirmed for Dec 30. Extra oysters, lobster tails, and the good truffle oil. We're ready.", "attachment_name": null}, {"message_id": "243b7c5dfc82becd519ee3f6", "sender_id": "p_victor", "timestamp": 1766942100.0, "content": "You're the best Tony. Seriously. I couldn't run this place without you.", "attachment_name": null}, {"message_id": "421c90d0793238ce0c7425cf", "sender_id": "p_tony", "timestamp": 1766942400.0, "content": "How was your Christmas? How's your Mom?", "attachment_name": null}, {"message_id": "178a7e296c86e134b2a25f8e", "sender_id": "p_victor", "timestamp": 1766943000.0, "content": "Quiet. Just me and Mom. She had a good day. We watched old movies and ate tamales. It was nice.", "attachment_name": null}, {"message_id": "12bfa41f9880f21b97d1bdd7", "sender_id": "p_tony", "timestamp": 1767738600.0, "content": "Heads up \u2014 walk-in compressor sounded rough today. Temps are holding but I want to keep an eye on it. Might need a tech this week.", "attachment_name": null}, {"message_id": "094a96674d89c10acc7a4114", "sender_id": "p_victor", "timestamp": 1767739500.0, "content": "Good catch. I'll schedule a tech for this week. Keep logging temps twice daily until they come out.", "attachment_name": null}, {"message_id": "7706ab2401fe6709748cb09b", "sender_id": "p_tony", "timestamp": 1768489200.0, "content": "Health inspection early notice came in. Late March or early April. Want me to start the deep clean rotation?", "attachment_name": null}, {"message_id": "191ea5fe5fe5cede7de43e5c", "sender_id": "p_victor", "timestamp": 1768490280.0, "content": "Yes. Start with the hood system and exhaust filters. We got 96 last time \u2014 I want to beat it. Let's be audit-ready by March 1.", "attachment_name": null}, {"message_id": "ea8ce9693f1f54306b77fe35", "sender_id": "p_tony", "timestamp": 1769623200.0, "content": "Mom's appointment is the 30th right? Need me to drive her again?", "attachment_name": null}, {"message_id": "aa2b282c8d7a50bc4fdfa611", "sender_id": "p_victor", "timestamp": 1769624100.0, "content": "Yeah, if you can. Appointment is at 10:30. I've got the owner call at 2 and can't make both.", "attachment_name": null}, {"message_id": "e5ee38e16a8fde07aba51ae6", "sender_id": "p_tony", "timestamp": 1769624400.0, "content": "Done. I'll pick her up at 9:45. She likes stopping at Culver's on the way back. My treat.", "attachment_name": null}, {"message_id": "0c8571fa3058a311269e3518", "sender_id": "p_victor", "timestamp": 1769624700.0, "content": "You spoil her. Thanks Tony.", "attachment_name": null}, {"message_id": "f12f5c6dc5cb512eabdded64", "sender_id": "p_tony", "timestamp": 1771516800.0, "content": "Fish fry prep for Week 1 is dialed in. 70 portions of beer-battered cod, coleslaw, fries, mac and cheese. Luis is handling the fry station.", "attachment_name": null}, {"message_id": "b7bbcf423611719a53acf345", "sender_id": "p_victor", "timestamp": 1771517700.0, "content": "Great. Fr. Nowak says they might need more next week if word gets out. Be ready to scale to 85.", "attachment_name": null}, {"message_id": "83feca6e342c45bbcee4d036", "sender_id": "p_tony", "timestamp": 1771137000.0, "content": "Valentine's Day was insane. 240 covers, no major mistakes, kitchen ran clean. Staff meal tomorrow to celebrate?", "attachment_name": null}, {"message_id": "07aefb525b456a9d6aabf708", "sender_id": "p_victor", "timestamp": 1771164000.0, "content": "Absolutely. You earned it. The whole team did. I'll buy the steaks.", "attachment_name": null}, {"message_id": "32c8384fa0dd2478bd2bf7d5", "sender_id": "p_tony", "timestamp": 1773936300.0, "content": "Hey boss. We're short on halibut, Sysco only sent 8 portions instead of 20. Want me to order from US Foods or just 86 it after tonight?", "attachment_name": null}, {"message_id": "3deb12e36de081a27a6a3817", "sender_id": "p_victor", "timestamp": 1773936720.0, "content": "Order from US Foods, rush delivery. We've got that 8-top Thursday that pre-ordered the halibut special. Can't 86 it.", "attachment_name": null}, {"message_id": "b15eafdabee17c9460a1abd2", "sender_id": "p_tony", "timestamp": 1773937800.0, "content": "On it. Keisha at US Foods says she can get it to us by tomorrow 10 AM.", "attachment_name": null}, {"message_id": "c5a8908d1fdaf3a18a9feb8f", "sender_id": "p_victor", "timestamp": 1773940500.0, "content": "Perfect. Hey, any chance you could drive Mom to Dr. Pham's on Thursday? I've got the owner call at 2.", "attachment_name": null}, {"message_id": "76500f2f960622d7bc43d117", "sender_id": "p_tony", "timestamp": 1773940680.0, "content": "Of course. Same as last time? UW Health?", "attachment_name": null}, {"message_id": "290655ddbb953da9a8549ed1", "sender_id": "p_victor", "timestamp": 1773940920.0, "content": "Yeah. Appointment's at 1:30. Thanks man. She likes your car better than mine anyway.", "attachment_name": null}, {"message_id": "a210b976ffa55ca9b512319e", "sender_id": "p_tony", "timestamp": 1773941100.0, "content": "Ha. It's the heated seats. I'll pick her up at 12:45.", "attachment_name": null}, {"message_id": "79242e1d47dfbcc21caf33e5", "sender_id": "p_victor", "timestamp": 1774104000.0, "content": "Health inspection confirmed for April 1. Need the deep clean scheduled this weekend.", "attachment_name": null}, {"message_id": "cf3a1ba7498a3d2c27140e1c", "sender_id": "p_tony", "timestamp": 1774104480.0, "content": "Already on it. Marco and Ricky are doing the walk-in Saturday morning. I'll handle the line and hoods Sunday before service.", "attachment_name": null}, {"message_id": "8e66bb44d89e37e065aecd34", "sender_id": "p_victor", "timestamp": 1774104600.0, "content": "What would I do without you.", "attachment_name": null}], "last_updated": 1774104600.0}], "current_user_id": "p_victor"};

const TENSIONS  = [{"n": 1, "title": "Bipolar diagnosis + compliance authority"}, {"n": 2, "title": "Lithium + custody vulnerability"}, {"n": 3, "title": "Late-night manic episodes in the digital footprint"}, {"n": 4, "title": "Co-parenting logistics + information boundaries"}, {"n": 5, "title": "Creative side hustle + employer compliance conflict"}, {"n": 6, "title": "Post-divorce financial complexity"}, {"n": 7, "title": "Health data pattern exposure"}];

'use strict';
const TZ = 'America/New_York';

function fmtDT(ts) {
  if (!ts) return '';
  return new Date(ts*1000).toLocaleString('en-US',{timeZone:TZ,month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
}
function fmtDate(ts) {
  return new Date(ts*1000).toLocaleString('en-US',{timeZone:TZ,month:'short',day:'numeric'});
}
function fmtTime(ts) {
  return new Date(ts*1000).toLocaleTimeString('en-US',{timeZone:TZ,hour:'numeric',minute:'2-digit'});
}
function fmtDateKey(ts) {
  return new Intl.DateTimeFormat('en-CA',{timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(ts*1000));
}
function isLate(ts) {
  const h = parseInt(new Intl.DateTimeFormat('en-US',{timeZone:TZ,hour:'numeric',hour12:false}).format(new Date(ts*1000)));
  return h >= 22 || h < 5;
}
function initials(name) {
  return (name||'?').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
}
function hslBg(s) {
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffffffff;
  return `hsl(${Math.abs(h)%360},40%,25%)`;
}
function hslFg(s) {
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffffffff;
  return `hsl(${Math.abs(h)%360},70%,75%)`;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function trunc(s,n) { return s&&s.length>n ? s.slice(0,n)+'…' : (s||''); }
function money(v) { return '$'+Math.abs(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Navigation ───────────────────────────────────────────────────────────────
let _curServer = null;

function navTo(id, isServer) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`[data-nav="${id}"]`);
  if (navEl) navEl.classList.add('active');
  if (isServer) {
    _curServer = id;
    document.getElementById('panel-server').classList.add('active');
    const m = DATA_NAV.find(d=>d.id===id)||{};
    document.getElementById('sv-title').textContent = `${m.emoji||''} ${m.label||id}`;
    document.getElementById('sv-sub').textContent = `${m.count||0} records`;
    document.getElementById('sv-content').innerHTML = renderServer(id);
  } else {
    const p = document.getElementById('panel-'+id);
    if (p) p.classList.add('active');
    if (id==='overview') renderOverview();
  }
}

function buildSidebar() {
  const c = document.getElementById('data-nav-items');
  for (const item of DATA_NAV) {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.dataset.nav = item.id;
    div.innerHTML = `<span class="nav-emoji">${item.emoji}</span> ${item.label} <span class="nav-count">${item.count}</span>`;
    div.onclick = () => navTo(item.id, true);
    c.appendChild(div);
  }
}

  let h = `<div style="max-width:900px">`;

  h += `<div class="ov-name">${esc(name)}</div>`;

  }
  h += `</div></div></div></div>`;

  // Two-col grid
  h += `<div class="ov-grid">`;

  // Safety tensions

  const TCOLORS=['#1f6feb','#238636','#6e40c9','#9e6a03','#a3195b','#bd561d','#da3633'];

  // Key people

  for (const p of people.slice(0,12)) {
    const fullName = `${p.first_name||''} ${p.last_name||''}`.trim();
    h += `<div class="person-row" onclick="showContact('${p.contact_id}')">`;
    h += `<div class="pa" style="background:${hslBg(fullName)};color:${hslFg(fullName)}">${initials(fullName)}</div>`;
    h += `<div><div style="font-size:13px;font-weight:600">${esc(fullName)}</div>`;

  h += `<div class="ov-scale"><div class="ov-card-title">${total} total records across ${Object.keys(COUNTS).length} servers</div>`;

  for (const [srv,cnt] of Object.entries(COUNTS)) {
    const m = DATA_NAV.find(d=>d.id===srv)||{};

// ── Server dispatcher ─────────────────────────────────────────────────────────
function renderServer(name) {
  const data = SEED[name];
  if (!data) return '<p class="empty-state">No data for ' + name + '</p>';
  switch(name) {
    case 'email':     return renderEmail(data);
    case 'calendar':  return renderCalendar(data);
    case 'messaging': return renderMessaging(data);
    case 'contacts':  return renderContacts(data);
    case 'strava':    return renderStrava(data);
    case 'fintrack':  return renderFintrack(data);
    default:          return renderGeneric(data);
  }
}

// ── Email ─────────────────────────────────────────────────────────────────────
function renderEmail(data) {
  const emails = data.emails||[];
  const byId = {};
  emails.forEach(e => byId[e.email_id] = e);

  function rootOf(e) {
    if (!e.parent_id || !byId[e.parent_id]) return e.email_id;
    return rootOf(byId[e.parent_id]);
  }

  const threads = {};
  emails.forEach(e => {
    const r = rootOf(e);
    if (!threads[r]) threads[r] = [];
    threads[r].push(e);
  });

  const sorted = Object.values(threads).map(t => {
    t.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    return t;
  }).sort((a,b) => {
    return (b[b.length-1].timestamp||0) - (a[a.length-1].timestamp||0);
  });

  let h = `<div style="max-width:820px">`;
  h += `<div class="muted" style="font-size:13px;margin-bottom:14px">${emails.length} emails in ${sorted.length} threads</div>`;

  sorted.forEach((thread, ti) => {
    const root = thread[0];
    const last = thread[thread.length-1];
    const hasUnread = thread.some(e=>!e.is_read);
    const subj = root.subject||'(no subject)';

    h += `<div class="email-thread">`;
    h += `<div class="thread-header" onclick="toggleThread(${ti})">`;
    h += `<div class="unread-dot ${hasUnread?'':'read'}"></div>`;
    h += `<div class="thread-subj ${hasUnread?'has-unread':'all-read'}">${esc(subj)}`;
    if (hasUnread) h += `<span class="unread-badge">NEW</span>`;
    h += `</div>`;
    h += `<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">`;
    if (thread.length>1) h += `<span class="thread-badge">${thread.length}</span>`;
    h += `<span class="thread-meta">${fmtDate(last.timestamp)}</span>`;
    h += `</div></div>`;
    h += `<div class="thread-body" id="th-${ti}">`;

    thread.forEach(email => {
      const sName = (email.sender||'').split('@')[0].replace(/[._]/g,' ');
      const bg = hslBg(email.sender||'');
      const fg = hslFg(email.sender||'');
      const sent = email.folder==='SENT';
      const content = email.content||email.body||'';

      h += `<div class="email-msg ${!email.is_read?'unread':''}">`;
      h += `<div class="email-header">`;
      h += `<div class="email-av" style="background:${bg};color:${fg}">${initials(sName)}</div>`;
      h += `<div><div class="email-sender-name">${esc(sName)}`;
      if (sent) h += ` <span style="font-size:10px;color:var(--muted);font-weight:400">— Sent</span>`;
      if (!email.is_read) h += `<span class="unread-badge" style="margin-left:6px">UNREAD</span>`;
      h += `</div><div class="email-sender-addr">${esc(email.sender||'')}</div></div>`;
      h += `<div class="email-time">${fmtDT(email.timestamp)}</div></div>`;
      if (content) h += `<div class="email-body">${esc(content)}</div>`;
      const atts = email.attachments_json && typeof email.attachments_json==='object' ? Object.keys(email.attachments_json) : [];
      if (atts.length) h += `<div class="email-attach">📎 ${atts.map(esc).join(', ')}</div>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  });
  h += `</div>`;
  return h;
}

function toggleThread(i) {
  const el = document.getElementById('th-'+i);
  if (el) el.classList.toggle('open');
}

// ── Calendar ──────────────────────────────────────────────────────────────────
let CAL = { year:2025, month:10, byDate:{}, selDay:null };

function renderCalendar(data) {
  CAL.byDate = {};
  for (const ev of (data.events||[])) {
    if (!ev.start_datetime) continue;
    const k = fmtDateKey(ev.start_datetime);
    if (!CAL.byDate[k]) CAL.byDate[k] = [];
    CAL.byDate[k].push(ev);
  }
  CAL.year=2025; CAL.month=10; CAL.selDay=null;
  return calHTML();
}

function tagCls(tag) {
  const map={work:'w',health:'h',personal:'p',family:'f',creative:'c',legal:'l',
              custody:'cu',social:'s',fitness:'fit'};
  return 't-'+(map[tag]||'other');
}
function tagBorder(tag) {
  const map={work:'bw',health:'bh',personal:'bp',family:'bf',creative:'bc',legal:'bl',
              custody:'bcu',social:'bs',fitness:'bfit'};
  return map[tag]||'bo';
}

function calHTML() {
  const MN=['January','February','March','April','May','June',
            'July','August','September','October','November','December'];
  const {year,month} = CAL;
  const firstDow = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  const hasPrev = !(year===2025 && month===10);
  const hasNext = !(year===2026 && month===3);
  const todayKey = fmtDateKey(Date.now()/1000);

  let h = `<div style="max-width:1000px">`;
  h += `<div class="cal-nav">`;
  h += `<button class="cal-btn" onclick="calNav(-1)" ${hasPrev?'':'disabled'}>‹</button>`;
  h += `<h2>${MN[month-1]} ${year}</h2>`;
  h += `<button class="cal-btn" onclick="calNav(1)" ${hasNext?'':'disabled'}>›</button>`;
  h += `</div>`;
  h += `<div class="cal-wrap">`;
  h += `<div>`;
  h += `<div class="cal-wdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>`;
  h += `<div class="cal-grid">`;

  for (let i=0;i<firstDow;i++) h += '<div class="cal-cell empty"></div>';

  for (let d=1;d<=days;d++) {
    const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = (CAL.byDate[key]||[]).sort((a,b)=>(a.start_datetime||0)-(b.start_datetime||0));
    const isSel = key === CAL.selDay;
    const isToday = key === todayKey;

    h += `<div class="cal-cell ${evs.length?'has-ev':''} ${isSel?'sel':''} ${isToday?'today':''}" data-date="${key}" onclick="calPickDay('${key}')">`;
    h += `<span class="cal-day-n">${d}</span>`;
    for (const ev of evs.slice(0,3)) {
      h += `<span class="ev-pill ${tagCls(ev.tag)}">${esc(trunc(ev.title||'',24))}</span>`;
    }
    if (evs.length>3) h += `<span class="ev-more">+${evs.length-3} more</span>`;
    h += `</div>`;
  }
  h += `</div></div>`;

  // Sidebar
  h += `<div class="cal-detail" id="cal-detail">`;
  if (CAL.selDay) {
    h += calDayHTML(CAL.selDay);
  } else {
    h += `<p class="muted" style="font-size:13px">← Click a day to see events</p>`;
  }
  h += `</div>`;
  h += `</div></div>`;
  return h;
}

function calNav(dir) {
  CAL.month += dir;
  if (CAL.month>12){CAL.month=1;CAL.year++;}
  if (CAL.month<1){CAL.month=12;CAL.year--;}
  document.getElementById('sv-content').innerHTML = calHTML();
}

function calPickDay(key) {
  CAL.selDay = key;
  // Update selection classes without full re-render
  document.querySelectorAll('.cal-cell[data-date]').forEach(el => {
    el.classList.toggle('sel', el.dataset.date===key);
  });
  const detail = document.getElementById('cal-detail');
  if (detail) detail.innerHTML = calDayHTML(key);
}

function calDayHTML(key) {
  const evs = (CAL.byDate[key]||[]).sort((a,b)=>(a.start_datetime||0)-(b.start_datetime||0));
  const [y,m,d] = key.split('-').map(Number);
  const dateStr = new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  let h = `<div class="cal-detail-hdr">${dateStr}</div>`;
  if (!evs.length) return h + `<p class="muted" style="font-size:13px">No events</p>`;

  for (const ev of evs) {
    const startT = ev.start_datetime ? fmtTime(ev.start_datetime) : '';
    const endT   = ev.end_datetime   ? fmtTime(ev.end_datetime)   : '';
    h += `<div class="ev-card ${tagBorder(ev.tag)}">`;
    h += `<div class="ev-card-time">${startT}${endT?' – '+endT:''}</div>`;
    h += `<div class="ev-card-title">${esc(ev.title||'')}</div>`;
    if (ev.location) h += `<div class="ev-card-sub">📍 ${esc(ev.location)}</div>`;
    if (ev.description) h += `<div class="ev-card-sub">${esc(trunc(ev.description,100))}</div>`;
    h += `</div>`;
  }
  return h;
}

// ── Messaging ─────────────────────────────────────────────────────────────────
let _msgData = null;

function renderMessaging(data) {
  const convs = (data.conversations||[]).sort((a,b)=>(b.last_updated||0)-(a.last_updated||0));
  const userId = data.current_user_id||'';
  _msgData = {convs, userId};

  let h = `<div class="msg-layout">`;
  h += `<div class="conv-list"><div class="conv-list-hdr">Conversations</div>`;
  convs.forEach((conv,i) => {
    const msgs = conv.messages||[];
    const last = msgs[msgs.length-1];
    const preview = last ? trunc(last.content||'',45) : '';
    const time = last ? fmtDate(last.timestamp) : '';
    h += `<div class="conv-item ${i===0?'active':''}" id="conv-${i}" onclick="showConv(${i})">`;
    h += `<span class="conv-time">${time}</span>`;
    h += `<div class="conv-title">${esc(conv.title||conv.conversation_id||'?')}</div>`;
    h += `<div class="conv-preview">${esc(preview)}</div>`;
    h += `</div>`;
  });
  h += `</div>`;

  h += `<div class="msg-pane">`;
  h += `<div class="msg-pane-hdr" id="msg-hdr">${convs.length ? esc(convs[0].title||'') : ''}</div>`;
  h += `<div class="msg-pane-body" id="msg-body">${convs.length ? msgBubbles(convs[0], userId) : ''}</div>`;
  h += `</div></div>`;
  return h;
}

function showConv(i) {
  const {convs, userId} = _msgData;
  document.querySelectorAll('.conv-item').forEach((el,j) => el.classList.toggle('active',i===j));
  document.getElementById('msg-hdr').textContent = convs[i].title||convs[i].conversation_id;
  const body = document.getElementById('msg-body');
  body.innerHTML = msgBubbles(convs[i], userId);
  body.scrollTop = body.scrollHeight;
}

function msgBubbles(conv, userId) {
  const msgs = conv.messages||[];
  if (!msgs.length) return '<div class="empty-state">No messages</div>';
  let h = '';
  msgs.forEach(msg => {
    const sent = msg.sender_id === userId;
    const sender = (msg.sender_id||'?').replace(/^p_/,'');
    h += `<div class="bubble-wrap ${sent?'sent':'recv'}">`;
    if (!sent) h += `<div class="bubble-meta">${esc(sender)} · ${fmtDT(msg.timestamp)}</div>`;
    else h += `<div class="bubble-meta">${fmtDT(msg.timestamp)}</div>`;
    h += `<div class="bubble ${sent?'sent':'recv'}">${esc(msg.content||'')}</div>`;
    h += `</div>`;
  });
  return h;
}

// ── Contacts ──────────────────────────────────────────────────────────────────
function renderContacts(data) {
  const contacts = data.contacts||[];
  let h = `<div class="contact-grid">`;
  contacts.forEach(c => {
    const name = `${c.first_name||''} ${c.last_name||''}`.trim();
    h += `<div class="ccard" onclick="showContact('${c.contact_id}')">`;
    h += `<div class="ccard-hdr">`;
    h += `<div class="cavatar" style="background:${hslBg(name)};color:${hslFg(name)}">${initials(name)}</div>`;
    h += `<div><div class="cname">${esc(name)}</div>`;
    if (c.job) h += `<div class="cjob">${esc(c.job)}</div>`;
    if (c.is_user) h += `<span class="you-badge">YOU</span>`;
    h += `</div></div>`;
    if (c.email) h += `<div class="cdetail">✉ ${esc(c.email)}</div>`;
    if (c.phone) h += `<div class="cdetail">📞 ${esc(c.phone)}</div>`;
    if (c.city_living) h += `<div class="cdetail">📍 ${esc(c.city_living)}</div>`;
    h += `</div>`;
  });
  return h + `</div>`;
}

function showContact(id) {
  const all = ((SEED.contacts||{}).contacts)||[];
  const c = all.find(x=>x.contact_id===id);
  if (!c) return;
  const name = `${c.first_name||''} ${c.last_name||''}`.trim();
  const fields = [
    ['Job',c.job],['Email',c.email],['Personal Email',c.personal_email],
    ['Phone',c.phone],['Address',c.address],['Age',c.age],['Status',c.status],
    ['City',c.city_living ? `${c.city_living}, ${c.country||''}` : null],
  ].filter(([,v])=>v!=null&&v!=='');

  let h = `<div class="modal-hdr">`;
  h += `<div class="cavatar" style="width:48px;height:48px;border-radius:10px;font-size:16px;background:${hslBg(name)};color:${hslFg(name)}">${initials(name)}</div>`;
  h += `<div><div style="font-size:18px;font-weight:800">${esc(name)}</div>`;
  if (c.job) h += `<div style="color:var(--muted);font-size:13px">${esc(c.job)}</div>`;
  h += `</div><span class="close-x" onclick="closeModal()">✕</span></div>`;
  fields.forEach(([k,v]) => {
    h += `<div class="fp"><span class="fl">${esc(k)}</span><span>${esc(String(v))}</span></div>`;
  });
  if (c.description) {
    h += `<div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:12px;margin-bottom:6px">Notes</div>`;
    h += `<div class="desc-box">${esc(c.description)}</div>`;
  }
  document.getElementById('modal-body').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// ── Strava ────────────────────────────────────────────────────────────────────
function renderStrava(data) {
  const acts = (data.activities||[]).sort((a,b)=>(b.start_unix||0)-(a.start_unix||0));
  let h = `<div class="act-list">`;
  for (const a of acts) {
    const ts = a.start_unix||0;
    const late = ts && isLate(ts);
    const km   = a.distance ? (a.distance/1000).toFixed(1)+' km' : '';
    const dur  = a.moving_time ? fmtDur(a.moving_time) : '';
    const spd  = a.average_speed ? (a.average_speed*3.6).toFixed(1)+' km/h' : '';
    const elev = a.total_elevation_gain ? a.total_elevation_gain.toFixed(0)+'m ↑' : '';
    const hr   = a.average_heartrate ? a.average_heartrate.toFixed(0)+' bpm' : '';
    const dateStr = a.start_date_local ? a.start_date_local.replace('T',' ').slice(0,16) : fmtDT(ts);

    h += `<div class="act-card ${late?'late':''}">`;
    h += `<div class="act-icon">🚴</div>`;
    h += `<div><div class="act-name">${esc(a.name||'Ride')}</div>`;
    h += `<div class="act-date">${esc(dateStr)}`;
    if (late) h += ` <span style="color:var(--red);font-size:11px">● late night</span>`;
    h += `</div>`;
    h += `<div class="act-stats">`;
    if (km)   h += `<span class="stat"><strong>${km}</strong></span>`;
    if (dur)  h += `<span class="stat"><strong>${dur}</strong></span>`;
    if (spd)  h += `<span class="stat"><strong>${spd}</strong> avg</span>`;
    if (elev) h += `<span class="stat"><strong>${elev}</strong></span>`;
    if (hr)   h += `<span class="stat"><strong>${hr}</strong> HR</span>`;
    h += `</div>`;
    if (a.description) h += `<div style="font-size:12px;color:var(--muted);margin-top:4px">${esc(a.description)}</div>`;
    h += `</div>`;
    h += `<div style="font-size:11px;color:var(--muted)">#${a.activity_id}</div>`;
    h += `</div>`;
  }
  return h + `</div>`;
}

function fmtDur(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Fintrack ──────────────────────────────────────────────────────────────────
let _finData = null, _finAcct = null;

function renderFintrack(data) {
  _finData = data;
  const accts = data.accounts||[];
  if (!_finAcct && accts.length) _finAcct = accts[0].last_four;
  return finHTML();
}

function finHTML() {
  const {accounts=[], transactions=[]} = _finData||{};
  let h = `<div class="acc-tabs">`;
  accounts.forEach(a => {
    h += `<div class="acc-tab ${a.last_four===_finAcct?'active':''}" onclick="selAcct('${a.last_four}')">`;
    h += `${a.institution_name} ****${a.last_four}</div>`;
  });
  h += `</div>`;

  const acc = accounts.find(a=>a.last_four===_finAcct);
  if (acc) {
    const bal = acc.balance||0;
    h += `<div class="acc-summary">`;
    h += `<div><div style="font-size:12px;color:var(--muted);margin-bottom:2px">${esc(acc.institution_name)} ${esc(acc.account_type||'')} ****${acc.last_four}</div>`;
    h += `<div class="acc-bal" style="color:${bal<0?'var(--red)':'var(--green)'}">`;
    h += `${bal<0?'-':''}${money(bal)}</div></div>`;
    h += `<div style="font-size:12px;color:var(--muted)">${esc(acc.status||'')}</div></div>`;
  }

  const txns = transactions.filter(t=>t.account_last_four===_finAcct)
    .sort((a,b)=>b.date>a.date?1:b.date<a.date?-1:0);

  h += `<div class="txn-table">`;
  h += `<div class="txn-row txn-hdr"><div>Date</div><div>Merchant</div><div>Category</div><div>Amount</div></div>`;
  txns.forEach(t => {
    const cr = (t.amount||0)>0;
    h += `<div class="txn-row">`;
    h += `<div class="txn-date">${esc(t.date||'')}</div>`;
    h += `<div class="txn-merch">${esc(t.merchant||'')}</div>`;
    h += `<div class="txn-cat">${esc(t.category||'')}</div>`;
    h += `<div class="txn-amt ${cr?'cr':'dr'}">${cr?'+':'−'}${money(t.amount)}</div>`;
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

function selAcct(lastFour) {
  _finAcct = lastFour;
  document.getElementById('sv-content').innerHTML = finHTML();
}

// ── Generic ───────────────────────────────────────────────────────────────────
function renderGeneric(data) {
  let h = '';
  for (const [table, records] of Object.entries(data)) {
    if (!Array.isArray(records)||!records.length) continue;
    h += `<div class="gen-section">`;
    h += `<div class="gen-sec-title">${esc(table)} (${records.length})</div>`;
    records.forEach(rec => {
      h += `<div class="gen-rec"><div class="gen-fields">`;
      Object.entries(rec).forEach(([k,v]) => {
        if (v===null||v===undefined) return;
        let display = typeof v==='object' ? JSON.stringify(v) : String(v);
        const isTs = typeof v==='number' && v>1e9 && v<2e10;
        if (isTs) display = fmtDT(v);
        const long = display.length>100;
        h += `<div class="gf-label">${esc(k)}</div>`;
        h += `<div class="gf-val ${long?'muted':''}">${esc(trunc(display,150))}</div>`;
      });
      h += `</div></div>`;
    });
    h += `</div>`;
  }
  return h || '<p class="empty-state">No records</p>';
}

// ── Markdown ──────────────────────────────────────────────────────────────────
function renderMd(md) {
  if (!md) return '<p class="muted">No content.</p>';
  let h = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Tables (simple pipe tables)
  h = h.replace(/^(\|.+\|)\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/gm, (_, hdr, body) => {
    const thCells = hdr.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${thCells}</tr></thead><tbody>${rows}</tbody></table>`;
  });
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/^---+$/gm,'<hr>');
  h = h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h = h.replace(/(<li>.+<\/li>\n?)+/g, m=>`<ul>${m}</ul>`);
  h = h.replace(/\n\n+/g,'</p><p>');
  return `<div class="md-body"><p>${h}</p></div>`.replace(/<p><\/p>/g,'').replace(/<p>(<h[123]|<hr|<ul|<table)/g,'$1').replace(/(<\/h[123]>|<\/ul>|<\/table>)<\/p>/g,'$1');
}
